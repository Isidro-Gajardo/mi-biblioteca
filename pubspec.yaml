name: mi_biblioteca
description: Biblioteca digital offline para leer PDFs.
publish_to: 'none'
version: 1.0.2+3

environment:
  sdk: '^3.11.5'

dependencies:
  flutter:
    sdk: flutter

  uuid: ^4.3.3

  google_mlkit_text_recognition: ^0.15.0

  shared_preferences: ^2.2.2
  
  # PDF
  pdfx: ^2.7.0
  syncfusion_flutter_pdf: ^27.1.48
  file_picker: ^8.0.0+1
  
  # Base de datos local
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Archivos y rutas
  path_provider: ^2.1.1
  path: ^1.9.0
  
  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true